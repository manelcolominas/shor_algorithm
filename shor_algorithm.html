<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shor's Algorithm — Step by Step</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fc;
    --bg2: #ffffff;
    --bg3: #f0f2f8;
    --border: rgba(30,60,140,0.10);
    --border-bright: rgba(30,60,140,0.28);
    --cyan: #1a5fd4;
    --cyan-dim: rgba(26,95,212,0.08);
    --cyan-glow: rgba(26,95,212,0.04);
    --green: #0a7c55;
    --green-dim: rgba(10,124,85,0.08);
    --amber: #b05a00;
    --amber-dim: rgba(176,90,0,0.08);
    --red: #c0392b;
    --text: #111827;
    --text-dim: #374151;
    --text-muted: #9ca3af;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,217,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,217,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .header-title {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--cyan);
  }

  .header-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 8px;
  }

  .badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border-bright);
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* Step cards */
  .step-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .step-card {
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    padding: 28px 32px;
    animation: fadeSlide 0.4s ease both;
    overflow: hidden;
  }

  .step-card:first-child {
    border-top: 1px solid var(--border);
    border-radius: 4px 4px 0 0;
  }

  .step-card:last-child {
    border-radius: 0 0 4px 4px;
  }

  .step-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--cyan), transparent);
    opacity: 0.6;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
  }

  .step-num {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    flex-shrink: 0;
  }

  .step-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .step-body {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text-dim);
    white-space: pre-wrap;
  }

  .step-body em {
    color: var(--amber);
    font-style: normal;
  }

  .step-body strong {
    color: var(--cyan);
    font-weight: 700;
  }

  /* Formula blocks */
  .formula {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    margin: 16px 0;
    font-size: 12.5px;
    color: var(--text);
    overflow-x: auto;
    line-height: 2;
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }

  .info-cell {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    text-align: center;
  }

  .info-cell .ic-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .info-cell .ic-value {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--cyan);
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* Canvases */
  canvas {
    display: block;
    margin: 16px auto;
    border-radius: 4px;
    background: var(--bg3);
  }

  /* Next button */
  .btn-next {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn-next:hover {
    background: var(--cyan-dim);
    border-color: var(--cyan);
  }

  .btn-next:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Hadamard states */
  .hstates {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
  }

  .hstate {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--cyan);
    animation: popIn 0.2s ease both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Period visualization */
  .period-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 16px 0;
  }

  .period-cell {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    border-right: 1px solid var(--border);
    transition: background 0.3s;
  }

  .period-cell:last-child { border-right: none; }

  .period-cell .pc-idx {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .period-cell .pc-val {
    font-size: 16px;
    font-family: var(--display);
    font-weight: 700;
  }

  .pc-1 .pc-val { color: var(--cyan); }
  .pc-2 .pc-val { color: var(--green); }
  .pc-3 .pc-val { color: var(--amber); }
  .pc-4 .pc-val { color: var(--red); }

  /* QFT peaks */
  .qft-axis {
    position: relative;
    height: 120px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg3);
    margin: 16px 0;
    overflow: hidden;
  }

  .qft-baseline {
    position: absolute;
    bottom: 24px;
    left: 20px;
    right: 20px;
    height: 1px;
    background: var(--border-bright);
  }

  .qft-peak {
    position: absolute;
    bottom: 25px;
    width: 2px;
    background: var(--cyan);
    border-radius: 1px 1px 0 0;
    transform-origin: bottom;
    transform: scaleY(0);
    transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
  }

  .qft-peak-label {
    position: absolute;
    bottom: 4px;
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
    transform: translateX(-50%);
  }

  /* Factor reveal */
  .factor-reveal {
    background: var(--green-dim);
    border: 1px solid rgba(57,255,180,0.3);
    border-radius: 4px;
    padding: 20px 24px;
    margin: 20px 0;
    text-align: center;
  }

  .factor-reveal .fr-eq {
    font-family: var(--display);
    font-size: 32px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -1px;
  }

  .factor-reveal .fr-label {
    font-size: 11px;
    color: rgba(57,255,180,0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border);
    z-index: 100;
  }

  .progress-fill {
    height: 100%;
    background: var(--cyan);
    transition: width 0.4s ease;
  }

  /* Interference wave canvas */
  #waveCanvas {
    border: 1px solid var(--border);
  }

  /* Circuit drawing */
  .circuit {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin: 16px 0;
    font-size: 12px;
    overflow-x: auto;
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="shell">
  <header>
    <div>
      <div class="header-title">Shor's Algorithm</div>
      <div class="header-sub">Quantum factoring — step by step</div>
    </div>
    <div class="badge">N = 15</div>
  </header>

  <div class="step-list" id="root"></div>
</div>

<script>
const N = 15;
const L = Math.ceil(Math.log2(N));
const K = 2 * L + 1 + Math.ceil(Math.log2(2 + 1 / (2 * 0.25)));
const M = Math.pow(2, K);
const TOTAL = 8;

let step = 0;

const steps = [
  {
    num: "Step 0",
    title: "Choosing qubit sizes",
    render(el) {
      el.innerHTML = `
        <div class="step-body">We begin by computing how many qubits we need for both registers.</div>
        <div class="formula">
L = ⌈log₂ N⌉ = ⌈log₂ 15⌉ = 4    <span style="color:var(--text-muted)">← target register</span>

K = 2L + 1 + ⌈log₂(2 + 1/(2ε))⌉
K = 2·4 + 1 + ⌈log₂(2 + 2)⌉
K = 9 + 2 = 11                   <span style="color:var(--text-muted)">← control register</span>

M = 2ᴷ = 2¹¹ = 2048              <span style="color:var(--text-muted)">← superposition size</span>
        </div>
        <div class="info-grid">
          <div class="info-cell"><div class="ic-label">L (target)</div><div class="ic-value">${L}</div></div>
          <div class="info-cell"><div class="ic-label">K (control)</div><div class="ic-value">${K}</div></div>
          <div class="info-cell"><div class="ic-label">M (states)</div><div class="ic-value">${M}</div></div>
          <div class="info-cell"><div class="ic-label">ε (error)</div><div class="ic-value">0.25</div></div>
        </div>`;
    }
  },

  {
    num: "Step 1",
    title: "Hadamard superposition",
    render(el) {
      el.innerHTML = `
        <div class="step-body">We apply a Hadamard gate to each qubit in the control register,
putting all M = 2048 basis states into an equal superposition.</div>
        <div class="formula">|0⟩⊗ᴷ  →  H⊗ᴷ  →  1/√M ∑ |j⟩   for j = 0 … M−1</div>
        <div class="step-body" style="color:var(--text-muted); font-size:12px; margin-bottom:8px;">Showing 16 representative states (sampled from 2048):</div>
        <div class="hstates" id="hstates"></div>`;

      const cont = el.querySelector('#hstates');
      const vis = 16;
      const step = Math.floor(M / vis);
      let i = 0;

      function tick() {
        if (i >= vis) return;
        const idx = i * step;
        const span = document.createElement('span');
        span.className = 'hstate';
        span.style.animationDelay = (i * 60) + 'ms';
        const bin = idx.toString(2).padStart(K, '0');
        span.textContent = `|${bin}⟩`;
        cont.appendChild(span);
        i++;
        setTimeout(tick, 70);
      }
      setTimeout(tick, 100);
    }
  },

  {
    num: "Step 2",
    title: "Modular exponentiation",
    render(el) {
      el.innerHTML = `
        <div class="step-body">We choose a random base x = 8 coprime to N = 15, then entangle the registers.</div>
        <div class="formula">|ψ⟩ = 1/√M ∑ⱼ |j⟩ ⊗ |8ʲ mod 15⟩</div>
        <div class="step-body">The first terms unroll as:</div>
        <div class="formula">|0⟩|1⟩ + |1⟩|8⟩ + |2⟩|4⟩ + |3⟩|2⟩
|4⟩|1⟩ + |5⟩|8⟩ + |6⟩|4⟩ + |7⟩|2⟩
|8⟩|1⟩ + |9⟩|8⟩ + |10⟩|4⟩ + |11⟩|2⟩
   ⋮       (pattern repeats every 4 steps)</div>`;
    }
  },

  {
    num: "Step 3",
    title: "Hidden periodicity",
    render(el) {
      const seq = [1, 8, 4, 2, 1, 8, 4, 2];
      const cols = ['pc-1', 'pc-2', 'pc-3', 'pc-4', 'pc-1', 'pc-2', 'pc-3', 'pc-4'];

      el.innerHTML = `
        <div class="step-body">Grouping by the target register value reveals a repeating pattern — the period <em>r</em>.</div>
        <div class="formula">(|0⟩ + |4⟩ + |8⟩ + …)|1⟩  ← period group A
(|1⟩ + |5⟩ + |9⟩ + …)|8⟩  ← period group B
(|2⟩ + |6⟩ + |10⟩ + …)|4⟩ ← period group C
(|3⟩ + |7⟩ + |11⟩ + …)|2⟩ ← period group D</div>
        <div class="step-body" style="margin-bottom:8px;">Sequence of 8ʲ mod 15:</div>
        <div class="period-row">
          ${seq.map((v,i) => `
            <div class="period-cell ${cols[i]}">
              <div class="pc-idx">j=${i}</div>
              <div class="pc-val">${v}</div>
            </div>`).join('')}
        </div>
        <div class="step-body" style="margin-top:8px;">Pattern: <strong>1 → 8 → 4 → 2 → 1 → …</strong>  ∴  <em>r = 4</em></div>`;
    }
  },

  {
    num: "Step 4",
    title: "Quantum Fourier Transform",
    render(el) {
      el.innerHTML = `
        <div class="step-body">The QFT converts periodicity into frequency. Phases interfere constructively
only at multiples of M/r = 2048/4 = 512.</div>
        <div class="formula">QFT : 1/√r ∑ₖ e^{2πi·k/r} |k·M/r⟩

constructive peaks at k = 0, 512, 1024, 1536</div>
        <div class="step-body" style="margin:12px 0 4px;">Interference pattern (phase sums across r=4 components):</div>
        <canvas id="waveCanvas" width="700" height="100" style="width:100%; height:100px;"></canvas>
        <div class="step-body" style="margin:12px 0 4px;">Frequency-domain peaks after QFT:</div>
        <div class="qft-axis" id="qftAxis">
          <div class="qft-baseline"></div>
        </div>`;

      drawWave(el.querySelector('#waveCanvas'));
      setTimeout(() => drawQFTPeaks(el.querySelector('#qftAxis')), 300);
    }
  },

  {
    num: "Step 5",
    title: "Measurement",
    render(el) {
      el.innerHTML = `
        <div class="step-body">We measure the control register. Suppose we observe:</div>
        <div class="formula" style="font-size:20px; text-align:center; color:var(--cyan); padding:24px;">k = 1536</div>
        <div class="step-body">Converting to a phase fraction:</div>
        <div class="formula">φ = k / M = 1536 / 2048 = <em>3/4</em></div>`;
    }
  },

  {
    num: "Step 6",
    title: "Continued fractions",
    render(el) {
      el.innerHTML = `
        <div class="step-body">We apply the continued fractions algorithm to recover the period from the measured phase.</div>
        <div class="formula">φ = 0.75

Continued fraction expansion:
0.75 = 3/4

Denominator → candidate period: <em>r = 4</em>

Verify: 8⁴ mod 15 = 4096 mod 15 = <strong>1</strong> ✓</div>`;
    }
  },

  {
    num: "Step 7",
    title: "Factorization",
    render(el) {
      el.innerHTML = `
        <div class="step-body">With period r = 4, we exploit the algebraic identity:</div>
        <div class="formula">xʳ ≡ 1 (mod N)

⇒  xʳ − 1 ≡ 0 (mod N)

⇒  (x^{r/2} − 1)(x^{r/2} + 1) ≡ 0 (mod N)</div>
        <div class="step-body">Plugging in x = 8, r = 4:</div>
        <div class="formula">x^{r/2} = 8² = 64

(64 − 1)(64 + 1) = 63 · 65</div>
        <div class="step-body">Computing GCDs:</div>
        <div class="formula">gcd(63, 15) = <strong>3</strong>
gcd(65, 15) = <strong>5</strong></div>
        <div class="factor-reveal">
          <div class="fr-eq">15 = 3 × 5</div>
          <div class="fr-label">Factored successfully</div>
        </div>`;
    }
  },
];

function drawWave(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const r = 4;
  ctx.strokeStyle = 'rgba(77,217,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  for (let x = 0; x < w; x++) {
    let sum = 0;
    for (let k = 0; k < r; k++) {
      sum += Math.cos((2 * Math.PI * k * x) / (w / 3));
    }
    const y = h / 2 - sum * (h * 0.18);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Mark constructive peaks
  const peakPositions = [0, w/3, 2*w/3, w-1];
  peakPositions.forEach(px => {
    ctx.strokeStyle = 'rgba(255,182,71,0.7)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(px, 10);
    ctx.lineTo(px, h - 10);
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

function drawQFTPeaks(container) {
  if (!container) return;
  const peaks = [0, 512, 1024, 1536];
  const labels = ['0', '512', '1024', '1536'];
  const containerW = container.offsetWidth || 680;
  const left = 30, right = containerW - 30;
  const usable = right - left;

  peaks.forEach((p, i) => {
    const x = left + (p / 2048) * usable;

    const bar = document.createElement('div');
    bar.className = 'qft-peak';
    bar.style.left = x + 'px';
    bar.style.height = '80px';
    container.appendChild(bar);
    setTimeout(() => { bar.style.transform = 'scaleY(1)'; }, i * 150 + 100);

    const lbl = document.createElement('div');
    lbl.className = 'qft-peak-label';
    lbl.style.left = x + 'px';
    lbl.textContent = labels[i];
    container.appendChild(lbl);
  });
}

function nextStep() {
  if (step >= steps.length) return;

  const s = steps[step];

  const card = document.createElement('div');
  card.className = 'step-card';

  const hdr = document.createElement('div');
  hdr.className = 'step-header';
  hdr.innerHTML = `
    <span class="step-num">${s.num}</span>
    <span class="step-title">${s.title}</span>`;
  card.appendChild(hdr);

  const body = document.createElement('div');
  card.appendChild(body);
  s.render(body);

  if (step < steps.length - 1) {
    const btn = document.createElement('button');
    btn.className = 'btn-next';
    btn.textContent = '→ Next step';
    btn.onclick = () => {
      btn.disabled = true;
      btn.textContent = '→ Advancing…';
      nextStep();
    };
    card.appendChild(btn);
  }

  document.getElementById('root').appendChild(card);

  // Progress
  const pct = ((step + 1) / steps.length) * 100;
  document.getElementById('progress').style.width = pct + '%';

  step++;
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

nextStep();
</script>
</body>
</html>
