<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shor's Algorithm — Classroom Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f8fafc;
      --bg3: #f1f5f9;
      --border: rgba(30,95,212,0.20);
      --border-bright: rgba(30,95,212,0.35);
      --cyan: #0052cc;
      --cyan-bright: #0052cc;
      --cyan-dim: rgba(0,82,204,0.08);
      --green: #00a854;
      --green-dim: rgba(0,168,84,0.10);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,0.10);
      --red: #dc2626;
      --text: #1a202c;
      --text-dim: #4a5568;
      --text-muted: #9ca3af;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 20px;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
              linear-gradient(rgba(0,82,204,0.06) 1px, transparent 1px),
              linear-gradient(90deg, rgba(0,82,204,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SPEAKER BAR ── */
    .speaker-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(240,244,249,0.97);
      border-bottom: 2px solid var(--cyan);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 18px;
      min-height: 72px;
      backdrop-filter: blur(8px);
    }

    .speaker-icon {
      font-size: 28px;
      flex-shrink: 0;
      animation: pulse-icon 2s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .speaker-text {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1.3;
      flex: 1;
    }

    .speaker-step-badge {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--cyan-bright);
      text-transform: uppercase;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar {
      position: fixed;
      top: 72px; left: 0; right: 0;
      height: 4px;
      background: rgba(0,82,204,0.1);
      z-index: 199;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--cyan-bright));
      transition: width 0.5s ease;
      box-shadow: 0 0 12px rgba(0,82,204,0.4);
    }

    /* ── TIMER BAR ── */
    .timer-bar {
      position: fixed;
      top: 76px; left: 0; right: 0;
      height: 3px;
      background: transparent;
      z-index: 199;
    }

    .timer-fill {
      height: 100%;
      background: var(--amber);
      width: 100%;
      transform-origin: left;
      opacity: 0;
    }

    .timer-fill.running {
      opacity: 1;
      transition: transform linear, opacity 0.3s;
    }

    /* ── MAIN SHELL ── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 110px 32px 120px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 52px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 28px;
    }

    .header-title {
      font-family: var(--display);
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--cyan-bright);
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 10px;
    }

    .badge {
      font-size: 18px;
      font-family: var(--display);
      font-weight: 800;
      padding: 8px 20px;
      border-radius: 4px;
      border: 2px solid var(--cyan-bright);
      color: var(--cyan-bright);
      letter-spacing: 1px;
      margin-top: 4px;
      box-shadow: 0 0 20px rgba(0,82,204,0.15);
    }

    /* ── STEP CARDS ── */
    .step-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      padding: 36px 40px;
      animation: fadeSlide 0.5s ease both;
      overflow: hidden;
      transition: opacity 0.5s, filter 0.5s;
    }

    .step-card:first-child {
      border-top: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
    }

    .step-card:last-child {
      border-radius: 0 0 6px 6px;
    }

    /* Focus mode: dim past steps */
    .step-card.past {
      opacity: 0.4;
      filter: none;
    }

    .step-card.active {
      opacity: 1;
      filter: none;
      border-left: 3px solid var(--cyan-bright);
      box-shadow: 0 0 40px rgba(61,139,255,0.06) inset;
    }

    .step-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--cyan), transparent);
      opacity: 0.5;
    }

    .step-card.active::before {
      opacity: 0;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 24px;
    }

    .step-num {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan-bright);
      flex-shrink: 0;
      opacity: 0.7;
    }

    .step-title {
      font-family: var(--display);
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .step-body {
      font-size: 19px;
      line-height: 1.9;
      color: var(--text-dim);
      white-space: pre-wrap;
    }

    .step-body em {
      color: var(--amber);
      font-style: normal;
      font-weight: 700;
    }

    .step-body strong {
      color: var(--cyan-bright);
      font-weight: 700;
    }

     /* ── FORMULA BLOCKS ── */
     .formula {
       background: linear-gradient(135deg, rgba(240,244,249,0.5) 0%, rgba(255,255,255,0.7) 100%);
       border: 1px solid rgba(0,82,204,0.18);
       border-left: 5px solid var(--cyan);
       border-radius: 2px;
       padding: 28px 36px;
       margin: 24px 0;
       font-size: 18px;
       color: var(--text);
       overflow-x: auto;
       line-height: 2.5;
       letter-spacing: 0.2px;
       box-shadow: 0 2px 16px rgba(0,82,204,0.08), inset 0 1px 3px rgba(255,255,255,0.5);
       font-family: 'Georgia', 'Cambria', 'Palatino', serif;
       word-spacing: 0.15em;
     }

    /* ── INFO GRID ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin: 20px 0;
    }

    .info-cell {
      background: var(--bg3);
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      padding: 20px 20px;
      text-align: center;
    }

    .info-cell .ic-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .info-cell .ic-value {
      font-family: var(--display);
      font-size: 52px;
      font-weight: 800;
      color: var(--cyan-bright);
      line-height: 1;
    }

    /* ── HADAMARD STATES ── */
    .hstates {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    .hstate {
      background: var(--bg3);
      border: 1px solid var(--border-bright);
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 16px;
      color: var(--cyan-bright);
      animation: popIn 0.2s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── PERIOD ROW ── */
    .period-row {
      display: flex;
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      overflow: hidden;
      margin: 20px 0;
    }

    .period-cell {
      flex: 1;
      padding: 18px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
      transition: background 0.3s;
    }

    .period-cell:last-child { border-right: none; }

    .period-cell .pc-idx {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .period-cell .pc-val {
      font-size: 32px;
      font-family: var(--display);
      font-weight: 800;
    }

    .pc-1 .pc-val { color: var(--cyan-bright); }
    .pc-2 .pc-val { color: var(--green); }
    .pc-3 .pc-val { color: var(--amber); }
    .pc-4 .pc-val { color: var(--red); }

    /* ── QFT PEAKS ── */
    .qft-axis {
      position: relative;
      height: 160px;
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      background: var(--bg3);
      margin: 20px 0;
      overflow: hidden;
    }

    .qft-baseline {
      position: absolute;
      bottom: 30px; left: 20px; right: 20px;
      height: 1px;
      background: var(--border-bright);
    }

    .qft-peak {
      position: absolute;
      bottom: 31px;
      width: 4px;
      background: linear-gradient(0deg, var(--cyan), var(--cyan-bright));
      border-radius: 2px 2px 0 0;
      transform-origin: bottom;
      transform: scaleY(0);
      transition: transform 0.7s cubic-bezier(0.23,1,0.32,1);
      box-shadow: 0 0 10px rgba(0,82,204,0.4);
    }

    .qft-peak-label {
      position: absolute;
      bottom: 6px;
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      transform: translateX(-50%);
      font-family: var(--mono);
    }

    /* ── CANVASES ── */
    canvas {
      display: block;
      margin: 20px auto;
      border-radius: 6px;
      background: var(--bg3);
      border: 2px solid var(--border-bright);
    }

    /* ── FACTOR REVEAL ── */
    .factor-reveal {
      background: var(--green-dim);
      border: 2px solid var(--green);
      border-radius: 8px;
      padding: 32px 32px;
      margin: 24px 0;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,201,122,0.15);
    }

    .factor-reveal .fr-eq {
      font-family: var(--display);
      font-size: 64px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -2px;
      line-height: 1;
    }

    .factor-reveal .fr-label {
      font-size: 14px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 12px;
      opacity: 0.7;
    }

    /* ── NEXT / CONTROL BUTTONS ── */
    .btn-next {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 14px 30px;
      background: transparent;
      border: 2px solid var(--cyan-bright);
      border-radius: 4px;
      color: var(--cyan-bright);
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .btn-next:hover {
      background: rgba(61,139,255,0.1);
      box-shadow: 0 0 20px rgba(61,139,255,0.25);
    }

    .btn-next:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── AUTO-PLAY CONTROLS ── */
    .controls-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border-bright);
      border-radius: 50px;
      padding: 10px 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: var(--cyan-dim);
      color: var(--cyan-bright);
      border-color: var(--cyan-bright);
    }

    .ctrl-btn.active {
      background: var(--cyan-dim);
      color: var(--cyan-bright);
      border-color: var(--cyan-bright);
    }

    .ctrl-sep {
      width: 1px;
      height: 20px;
      background: var(--border-bright);
    }

    .ctrl-speed-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
  </style>
</head>
<body>

<!-- Speaker bar (professor voice) -->
<div class="speaker-bar" id="speakerBar">
  <span class="speaker-icon">🎓</span>
  <span class="speaker-text" id="speakerText">Welcome — let's factor 15 with a quantum computer.</span>
  <span class="speaker-step-badge" id="speakerBadge">Intro</span>
</div>

<!-- Progress bar -->
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<!-- Auto-advance timer bar -->
<div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>

<div class="shell">
  <header>
    <div>
      <div class="header-title">Shor's Algorithm</div>
      <div class="header-sub">Quantum factoring — step by step</div>
    </div>
    <div class="badge">N = 15</div>
  </header>

  <div class="step-list" id="root"></div>
</div>

<!-- Bottom controls -->
<div class="controls-bar">
  <button class="ctrl-btn" id="btnPrev" onclick="goBack()">← Prev</button>
  <button class="ctrl-btn" id="btnNext2" onclick="manualNext()">Next →</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" id="btnAuto" onclick="toggleAuto()">▶ Auto</button>
  <div class="ctrl-sep"></div>
  <span class="ctrl-speed-label">Speed:</span>
  <button class="ctrl-btn" id="spd6" onclick="setSpeed(6)">Slow</button>
  <button class="ctrl-btn active" id="spd4" onclick="setSpeed(4)">Normal</button>
  <button class="ctrl-btn" id="spd2" onclick="setSpeed(2)">Fast</button>
</div>

<script>
  const N = 15;
  const L = Math.ceil(Math.log2(N));
  const K = 2 * L + 1 + Math.ceil(Math.log2(2 + 1 / (2 * 0.25)));
  const M = Math.pow(2, K);
  const TOTAL = 8;

  let step = 0;
  let autoPlay = false;
  let autoTimer = null;
  let speedSec = 4;
  const cardRefs = [];

  // Professor narrator lines per step
  const speakerLines = [
    "First — how many qubits do we need? We calculate the register sizes from N=15.",
    "Now we apply Hadamard gates to put ALL 2048 states into superposition simultaneously.",
    "We pick a random base x=8 and compute 8^j mod 15 for every j — all at once, quantumly.",
    "Measuring the second register collapses it, revealing a hidden repeating structure — the period r.",
    "The Quantum Fourier Transform converts that repeating pattern into sharp frequency peaks.",
    "We measure the control register. The result encodes a fraction with r in the denominator.",
    "Classical continued fractions extracts the period r=4 from the measured phase.",
    "With r=4, a simple GCD calculation gives us the factors — 15 = 3 × 5. Done!",
  ];

  const steps = [
    {
      num: "Step 0",
      title: "Choosing qubit sizes",
      render(el) {
        el.innerHTML = `
        <div class="step-body">We begin by computing how many qubits we need for both registers.</div>
        <div class="formula">
L = ⌈log₂ N⌉ = ⌈log₂ 15⌉ = 4    <span style="color:var(--text-muted)">← target register</span>

K = 2L + 1 + ⌈log₂(2 + 1/(2ε))⌉
K = 2·4 + 1 + ⌈log₂(2 + 2)⌉
K = 9 + 2 = 11                   <span style="color:var(--text-muted)">← control register</span>

M = 2ᴷ = 2¹¹ = 2048              <span style="color:var(--text-muted)">← superposition size</span>
        </div>
        <div class="info-grid">
          <div class="info-cell"><div class="ic-label">L (target)</div><div class="ic-value">${L}</div></div>
          <div class="info-cell"><div class="ic-label">K (control)</div><div class="ic-value">${K}</div></div>
          <div class="info-cell"><div class="ic-label">M (states)</div><div class="ic-value">${M}</div></div>
          <div class="info-cell"><div class="ic-label">ε (error)</div><div class="ic-value">0.25</div></div>
        </div>`;
      }
    },
    {
      num: "Step 1",
      title: "Hadamard superposition",
      render(el) {
        el.innerHTML = `
              <div class="step-body">We apply a Hadamard gate to each qubit in the control register,
          putting all M = 2048 basis states into an equal superposition.</div>
              <div class="formula">|0⟩⊗ᴷ  →  H⊗ᴷ  →  1/√M ∑ |j⟩   for j = 0 … M−1</div>
              <div class="step-body" style="margin:14px 0 6px;">The resulting superposition state:</div>
              <div class="formula" style="font-size:18px; line-height:2.4; overflow-x:auto; word-break: break-word;">
          1/√2048 (|00000000000⟩ + |00000000001⟩ + |00000000010⟩ + |00000000011⟩ + |00000000100⟩ + |00000000101⟩ + |00000000110⟩ + |00000000111⟩ + … + |11111111100⟩ + |11111111101⟩+ |11111111110⟩ + |11111111111⟩) = 1/√2048 (|0⟩ + |1⟩ + |2⟩ + |3⟩ + |4⟩ + |5⟩ + |6⟩ + |7⟩ + … + |2044⟩ + |2045⟩ + |2046⟩ + |2047⟩)
              </div>`;
      }
    },

    {
      num: "Step 2",
      title: "Modular exponentiation",
      render(el) {
        el.innerHTML = `
        <div class="step-body">We choose a random base x = 8 coprime to N = 15, then entangle the registers.</div>
        <div class="formula">|ψ⟩ = 1/√M ∑ⱼ |j⟩ ⊗ |8ʲ mod 15⟩</div>
        <div class="step-body">The terms unroll as:</div>
        <div class="formula"> 1/√2048 (|0⟩|1⟩ + |1⟩|8⟩ + |2⟩|4⟩ + |3⟩|2⟩
|4⟩|1⟩ + |5⟩|8⟩ + |6⟩|4⟩ + |7⟩|2⟩
|8⟩|1⟩ + |9⟩|8⟩ + |10⟩|4⟩ + |11⟩|2⟩ + ... + |2044⟩|1⟩ + |2045⟩|8⟩ +|2046⟩|4⟩ +|2047⟩|2⟩
   ⋮       (pattern repeats every 4 steps)</div>`;
      }
    },

    {
      num: "Step 3",
      title: "Hidden periodicity",
      render(el) {
        const seq = [1, 8, 4, 2, 1, 8, 4, 2];
        const cols = ['pc-1', 'pc-2', 'pc-3', 'pc-4', 'pc-1', 'pc-2', 'pc-3', 'pc-4'];

        el.innerHTML = `
        <div class="step-body">Grouping by the target register value reveals a repeating pattern — the period <em>r</em>.</div>
        <div class="formula">
    1/√2048 (|0⟩ + |4⟩ + |8⟩ + … + |2040⟩ + |2044⟩)|1⟩  ← period group A
    <br>
    1/√2048 (|1⟩ + |5⟩ + |9⟩ + … + |2041⟩ + |2045⟩)|8⟩  ← period group B
    <br>
    1/√2048 (|2⟩ + |6⟩ + |10⟩ + … + |2042⟩ + |2046⟩)|4⟩ ← period group C
    <br>
    1/√2048 (|3⟩ + |7⟩ + |11⟩ + … + |2043⟩ + |2047⟩)|2⟩ ← period group D
        </div>
        <div class="step-body" style="margin-bottom:12px;">Sequence of 8ʲ mod 15:</div>
        <div class="period-row">
          ${seq.map((v,i) => `
            <div class="period-cell ${cols[i]}">
              <div class="pc-idx">j=${i}</div>
              <div class="pc-val">${v}</div>
            </div>`).join('')}
        </div>
        <div class="step-body" style="margin-top:12px;">Pattern: <strong>1 → 8 → 4 → 2 → 1 → …</strong>  ∴  <em>r = 4</em></div>`;
      }
    },

    {
      num: "Step 4",
      title: "Quantum Fourier Transform",
      render(el) {
        el.innerHTML = `
        <div class="step-body">The QFT converts periodicity into frequency. Phases interfere constructively
only at multiples of M/r = 2048/4 = 512.</div>
        <div class="formula">QFT : 1/√r ∑ₖ e^{2πi·k/r} |k·M/r⟩

constructive peaks at k = 0, 512, 1024, 1536</div>
        <div class="step-body" style="margin:14px 0 6px;">Interference pattern (phase sums across r=4 components):</div>
        <canvas id="waveCanvas" width="800" height="140" style="width:100%; height:140px;"></canvas>
        <div class="step-body" style="margin:14px 0 6px;">Frequency-domain peaks after QFT:</div>
        <div class="qft-axis" id="qftAxis">
          <div class="qft-baseline"></div>
        </div>`;

        drawWave(el.querySelector('#waveCanvas'));
        setTimeout(() => drawQFTPeaks(el.querySelector('#qftAxis')), 300);
      }
    },

    {
      num: "Step 5",
      title: "Measurement",
      render(el) {
        el.innerHTML = `
        <div class="step-body">We measure the control register. Suppose we observe:</div>
        <div class="formula" style="font-size:52px; text-align:center; color:var(--cyan-bright); padding:32px; letter-spacing:-2px;">k = 1536</div>
        <div class="step-body">Converting to a phase fraction:</div>
        <div class="formula">φ = k / M = 1536 / 2048 = <em>3/4</em></div>`;
      }
    },

    {
      num: "Step 6",
      title: "Continued fractions",
      render(el) {
        el.innerHTML = `
        <div class="step-body">We apply the continued fractions algorithm to recover the period from the measured phase.</div>
        <div class="formula">φ = 0.75

Continued fraction expansion:
0.75 = 3/4

Denominator → candidate period: <em>r = 4</em>

Verify: 8⁴ mod 15 = 4096 mod 15 = <strong>1</strong> ✓</div>`;
      }
    },
    {
      num: "Step 7",
      title: "Factorization",
      render(el) {
        el.innerHTML = `
        <div class="step-body">With period r = 4, we exploit the algebraic identity to find factors of N = 15:</div>

        <div class="step-body" style="margin-top:16px; color:var(--text-dim); font-size:16px;">Step 1: Use the period identity</div>
        <div class="formula">xʳ (mod N) ≡ 1
    ⇒  xʳ − 1 (mod N) ≡ 0
    ⇒  (x^{r/2} − 1)(x^{r/2} + 1) (mod N) ≡ 0 </div>

        <div class="step-body" style="margin-top:16px; color:var(--text-dim); font-size:16px;">Step 2: Substitute x = 8, r = 4</div>
        <div class="formula">r/2 = 4/2 = 2
    x^{r/2} = 8² = 64
    <br>
    (64 − 1)(64 + 1) (mod 15) ≡ 0
    <br>
    63 · 65 (mod 15) ≡ 0 </div>

        <div class="step-body" style="margin-top:16px; color:var(--text-dim); font-size:16px;">Step 3: Compute GCDs to extract factors</div>
        <div class="formula">gcd(x^{r/2} − 1, N) = gcd(63, 15) = <strong style="color:var(--green);">3</strong>
    <br>
    gcd(x^{r/2} + 1, N) = gcd(65, 15) = <strong style="color:var(--green);">5</strong></div>

        <div class="step-body" style="margin-top:16px; color:var(--text-dim); font-size:16px;">Result:</div>
        <div class="factor-reveal">
          <div class="fr-eq">15 = 3 × 5</div>
          <div class="fr-label">✓ Factored successfully</div>
        </div>`;
      }
    }

  ];

  function drawWave(canvas) {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const r = 4;
    ctx.strokeStyle = '#0052cc';
    ctx.lineWidth = 3;
    ctx.beginPath();

    for (let x = 0; x < w; x++) {
      let sum = 0;
      for (let k = 0; k < r; k++) {
        sum += Math.cos((2 * Math.PI * k * x) / (w / 3));
      }
      const y = h / 2 - sum * (h * 0.2);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    const peakPositions = [0, w/3, 2*w/3, w-1];
    peakPositions.forEach(px => {
      ctx.strokeStyle = 'rgba(217,119,6,0.8)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(px, 10);
      ctx.lineTo(px, h - 10);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  function drawQFTPeaks(container) {
    if (!container) return;
    const peaks = [0, 512, 1024, 1536];
    const labels = ['0', '512', '1024', '1536'];
    const containerW = container.offsetWidth || 800;
    const left = 40, right = containerW - 40;
    const usable = right - left;

    peaks.forEach((p, i) => {
      const x = left + (p / 2048) * usable;

      const bar = document.createElement('div');
      bar.className = 'qft-peak';
      bar.style.left = x + 'px';
      bar.style.height = '110px';
      container.appendChild(bar);
      setTimeout(() => { bar.style.transform = 'scaleY(1)'; }, i * 180 + 100);

      const lbl = document.createElement('div');
      lbl.className = 'qft-peak-label';
      lbl.style.left = x + 'px';
      lbl.textContent = labels[i];
      container.appendChild(lbl);
    });
  }

  function updateSpeaker(stepIdx) {
    const text = speakerLines[stepIdx] || '';
    const badge = steps[stepIdx] ? steps[stepIdx].num : '';
    document.getElementById('speakerText').textContent = text;
    document.getElementById('speakerBadge').textContent = badge;
  }

  function updateFocusMode() {
    cardRefs.forEach((card, i) => {
      card.classList.remove('past', 'active');
      if (i < step - 1) card.classList.add('past');
      else if (i === step - 1) card.classList.add('active');
    });
  }

  function nextStep() {
    if (step >= steps.length) return false;

    const s = steps[step];

    const card = document.createElement('div');
    card.className = 'step-card';
    cardRefs.push(card);

    const hdr = document.createElement('div');
    hdr.className = 'step-header';
    hdr.innerHTML = `
    <span class="step-num">${s.num}</span>
    <span class="step-title">${s.title}</span>`;
    card.appendChild(hdr);

    const body = document.createElement('div');
    card.appendChild(body);
    s.render(body);

    document.getElementById('root').appendChild(card);

    const pct = ((step + 1) / steps.length) * 100;
    document.getElementById('progress').style.width = pct + '%';

    updateSpeaker(step);
    step++;
    updateFocusMode();

    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return true;
  }

  function manualNext() {
    if (step < steps.length) {
      nextStep();
      if (autoPlay) startTimer();
    }
  }

  function goBack() {
    // Restart from beginning up to step-1
    if (step <= 1) return;
    step = 0;
    cardRefs.length = 0;
    document.getElementById('root').innerHTML = '';
    const target = Math.max(0, cardRefs.length);
    // rebuild up to previous step count minus 1
    const prevCount = parseInt(goBack._prev || 1) - 1;
    goBack._prev = step;

    // Simple: just remove last card
    const cards = document.getElementById('root').children;
    // Re-render by removing last child
    const root = document.getElementById('root');
    if (root.lastChild) {
      root.removeChild(root.lastChild);
      cardRefs.pop();
      step--;
      if (step < 0) step = 0;
      updateFocusMode();
      if (step > 0) updateSpeaker(step - 1);
      const pct = (step / steps.length) * 100;
      document.getElementById('progress').style.width = pct + '%';
    }
  }

  // Simpler back: rebuild
  function goBack() {
    if (step <= 1) return;
    const targetStep = step - 1;
    step = 0;
    cardRefs.length = 0;
    document.getElementById('root').innerHTML = '';
    for (let i = 0; i < targetStep; i++) nextStep();
    stopTimer();
    if (autoPlay) startTimer();
  }

  function toggleAuto() {
    autoPlay = !autoPlay;
    const btn = document.getElementById('btnAuto');
    if (autoPlay) {
      btn.textContent = '⏸ Pause';
      btn.classList.add('active');
      startTimer();
    } else {
      btn.textContent = '▶ Auto';
      btn.classList.remove('active');
      stopTimer();
    }
  }

  function startTimer() {
    stopTimer();
    if (step >= steps.length) return;
    const fill = document.getElementById('timerFill');
    fill.style.transition = 'none';
    fill.style.transform = 'scaleX(1)';
    fill.classList.add('running');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fill.style.transition = `transform ${speedSec}s linear`;
        fill.style.transform = 'scaleX(0)';
      });
    });

    autoTimer = setTimeout(() => {
      const advanced = nextStep();
      if (advanced && autoPlay && step < steps.length) {
        startTimer();
      } else if (!advanced || step >= steps.length) {
        autoPlay = false;
        document.getElementById('btnAuto').textContent = '▶ Auto';
        document.getElementById('btnAuto').classList.remove('active');
        stopTimer();
      }
    }, speedSec * 1000);
  }

  function stopTimer() {
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    const fill = document.getElementById('timerFill');
    fill.classList.remove('running');
    fill.style.transition = 'none';
    fill.style.transform = 'scaleX(1)';
  }

  function setSpeed(s) {
    speedSec = s;
    document.querySelectorAll('[id^="spd"]').forEach(b => b.classList.remove('active'));
    document.getElementById('spd' + s).classList.add('active');
    if (autoPlay) startTimer();
  }

  // Start with first step
  nextStep();
</script>
